server.port=1010
spring.application.name=API-GATEWAY

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.routes[0].id=1
spring.cloud.gateway.routes[0].predicates=Path=/api/v1/accounts/**
spring.cloud.gateway.routes[0].uri=lb://ACCOUNT-SERVICE

spring.cloud.gateway.routes[1].id=2
spring.cloud.gateway.routes[1].predicates=Path=/api/v1/transactions/**
spring.cloud.gateway.routes[1].uri=lb://TRANSACTION-SERVICE

spring.cloud.gateway.routes[2].id=3
spring.cloud.gateway.routes[2].predicates=Path=/api/v1/customers/**
spring.cloud.gateway.routes[2].uri=lb://CUSTOMER-SERVICE
